async function buildExcelB64(form) {
  if (!window.ExcelJS) {
    await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js";
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const wb = new window.ExcelJS.Workbook();
  const ws = wb.addWorksheet("용접기록서");
  const logoId = wb.addImage({ base64: LOGO_B64, extension: "jpeg" });
  ws.addImage(logoId, {
    tl: { col: 0.16, row: 0.24 },
    ext: { width: 85, height: 64 },
    editAs: "absolute"
  });
  const signId = wb.addImage({ base64: SIGN_B64, extension: "jpeg" });
  ws.addImage(signId, {
    tl: { col: 3, row: 15.13 },
    ext: { width: 50, height: 52 },
    editAs: "absolute"
  });

  const RED = { argb:"FFFF0000" }, BLK = { argb:"FF000000" };
  const bs  = s => (s && s !== null) ? { style:s, color:BLK } : undefined;
  const mkBd= (l="thin",r="thin",t="thin",b="thin") => {
    const o = {};
    if (l && l !== null) o.left   = bs(l);
    if (r && r !== null) o.right  = bs(r);
    if (t && t !== null) o.top    = bs(t);
    if (b && b !== null) o.bottom = bs(b);
    return o;
  };

  function C(addr, val, {
    bold=false, sz=9, color=BLK,
    ha="center", va="middle", wrap=true,
    l="thin", r="thin", t="thin", b="thin"
  } = {}) {
    const cell = ws.getCell(addr);
    cell.value     = val != null ? String(val) : "";
    cell.font      = { bold, size:sz, color, name:"맑은 고딕" };
    cell.alignment = { horizontal:ha, vertical:va, wrapText:wrap };
    cell.border    = mkBd(l, r, t, b);
  }

  [4.78,7.78,12.78,4.78,2.78,2.78,7.78,5.78,13.78,7.78,4.78,9.00,

              `E${r1}:F${r2}`,`G${r1}:G${r2}`,
              `K${r1}:L${r1}`,`K${r2}:L${r2}`,`Q${r1}:Q${r2}`];
    }).flat(),
    "A14:Q15",
    "A16:B17","C16:E17","F16:G16","L16:Q19","J17:K17",
    "A18:B19","C18:E19","F18:G18","J19:K19",
    "A20:C20","N20:Q20",
  ].forEach(range => ws.mergeCells(range));

  /* ── F16:K19 : 내부 테두리 제거 후 바깥 테두리만 + 서명/날짜 밑줄 ── */
  for (let r = 16; r <= 19; r++) {
    for (let c = 6; c <= 11; c++) {  // F=6, K=11
      const cell = ws.getCell(r, c);
      const bd = {};
      // 바깥 테두리
      if (r === 16) bd.top    = bs("thin");
      if (r === 19) bd.bottom = bs("thin");
      if (c === 6)  bd.left   = bs("thin");
      if (c === 11) bd.right  = bs("thin");
      // 이름/서명 밑줄: H~K (16행, 18행)
      if ((r === 16 || r === 18) && c >= 8) bd.bottom = bs("thin");
      // 날짜 밑줄: H~I (19행만) — 17행 제거
      if (r === 19 && c >= 8 && c <= 9) bd.bottom = bs("thin");
      cell.border = bd;
    }
  }

  /* ── 행 높이 강제 적용 (ExcelJS ×0.8 변환 보정: 원하는값 ×1.25 입력) ── */
  [
    {r:1,h:40},{r:2,h:40},
    {r:8,h:31.25},{r:9,h:31.25},{r:10,h:31.25},{r:11,h:31.25},{r:12,h:31.25},{r:13,h:31.25},
    {r:16,h:37.5},{r:17,h:18.75},{r:18,h:37.5},{r:19,h:18.75}
  ].forEach(({r,h})=>{
    const row = ws.getRow(r);
    row.height = h;
    row.customHeight = true;
  });

  /* ── 인쇄 설정: A4 가로방향 ── */
  ws.pageSetup = {
    paperSize: 9,          // 9 = A4
    orientation: "landscape",
    fitToPage: true,
    fitToWidth: 1,
    fitToHeight: 1,
    horizontalCentered: true,
  };

  /* ── A1:Q19 굵은 바깥 테두리 ── */
  const thick = { style:"medium", color:BLK };
  for (let r = 1; r <= 19; r++) {
    for (let c = 1; c <= 17; c++) {
      const cell = ws.getCell(r, c);
      const bd = Object.assign({}, cell.border || {});
      if (r === 1)  bd.top    = thick;
      if (r === 19) bd.bottom = thick;
      if (c === 1)  bd.left   = thick;
      if (c === 17) bd.right  = thick;
      cell.border = bd;
    }
  }

  const buf   = await wb.xlsx.writeBuffer();
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i=0; i<bytes.length; i+=8192)
    bin += String.fromCharCode(...bytes.subarray(i,i+8192));
  return btoa(bin);
}


function AutoIn({lb, v, onChange, h=[], onSave, onDelete, ph="", style={}}) {
  const [open, setOpen] = useState(false);
  const [flt, setFlt]   = useState("");
  const [pos, setPos]   = useState({top:0, left:0, width:220});
  const inputRef = useRef();
  const shown = useMemo(() => {
    if (!h.length) return [];
    const q = flt.toLowerCase().trim();
    return (q ? h.filter(x => x.toLowerCase().includes(q)) : h).slice(0, 12);
  }, [h, flt]);
  const calcPos = () => {
    if (inputRef.current) {
      const r = inputRef.current.getBoundingClientRect();
      setPos({top: r.bottom+2, left: r.left, width: Math.max(r.width,220)});
    }
  };
  return (
    <div style={{position:"relative",...style}}>
      {lb && <div style={{fontSize:12,color:"#64748b",marginBottom:4,fontWeight:600}}>{lb}</div>}
      <input ref={inputRef} value={v} placeholder={ph}
        style={{width:"100%",padding:"8px 10px",border:"1.5px solid #cbd5e1",borderRadius:5,
                fontSize:13,background:"#fff",color:"#1e293b",outline:"none",boxSizing:"border-box"}}
        onChange={e => { onChange(e.target.value); setFlt(e.target.value); calcPos(); setOpen(true); }}
        onFocus={() => { calcPos(); setFlt(""); setOpen(h.length>0); }}
        onBlur={() => { setTimeout(()=>setOpen(false),160); onSave && onSave(v); }}
      />
      {open && shown.length > 0 && (
        <ul style={{position:"fixed",top:pos.top,left:pos.left,width:pos.width,zIndex:99999,
                    backgroundColor:"#fff",border:"2px solid #3b82f6",borderRadius:7,
                    maxHeight:280,overflowY:"auto",boxShadow:"0 8px 28px rgba(0,0,0,.35)",padding:0,margin:0}}>
          <li style={{padding:"6px 14px",fontSize:11,color:"#64748b",backgroundColor:"#f8fafc",
                      borderBottom:"1px solid #e2e8f0",listStyle:"none",cursor:"default"}}>
            이력 {h.length}개
          </li>
          {shown.map((x,i) => (
            <li key={i}
              onMouseDown={e => { e.preventDefault(); onChange(x); setOpen(false); onSave && onSave(x); }}
              style={{display:"flex",alignItems:"center",fontSize:13,cursor:"pointer",
                      backgroundColor:"#fff",borderBottom:"1px solid #e2e8f0",listStyle:"none"}}
              onMouseEnter={e => e.currentTarget.style.backgroundColor="#dbeafe"}
              onMouseLeave={e => e.currentTarget.style.backgroundColor="#fff"}>
              <span style={{flex:1,padding:"10px 8px 10px 14px",color:"#111"}}>{x}</span>
              {onDelete && (
                <span onMouseDown={e => { e.preventDefault(); e.stopPropagation(); onDelete(x); }}
                  style={{padding:"10px 13px",color:"#94a3b8",fontSize:13,cursor:"pointer",
                          flexShrink:0,borderLeft:"1px solid #e2e8f0"}}
                  onMouseEnter={e => { e.stopPropagation(); e.currentTarget.style.color="#e74c3c"; e.currentTarget.style.backgroundColor="#fee2e2"; }}
                  onMouseLeave={e => { e.stopPropagation(); e.currentTarget.style.color="#94a3b8"; e.currentTarget.style.backgroundColor="transparent"; }}>
                  ✕
                </span>
              )}
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function PdfViewer({pdfB64, name}) {
  const [pages, setPages]   = useState([]);
  const [status, setStatus] = useState("loading");
  const [scale, setScale]   = useState(1.4);
  useEffect(() => {
    if (!pdfB64) return;
    setStatus("loading"); setPages([]);
    const loadLib = () => new Promise((res,rej) => {
      if (window.pdfjsLib) { res(window.pdfjsLib); return; }
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      s.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        res(window.pdfjsLib);
      };
      s.onerror = rej;
      document.head.appendChild(s);
    });
    (async () => {
      try {
        const lib = await loadLib();
        const bin = atob(pdfB64);
        const arr = new Uint8Array(bin.length);
        for (let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
        const pdf = await lib.getDocument({data:arr}).promise;
        const loaded = [];
        for (let p=1; p<=pdf.numPages; p++) loaded.push(await pdf.getPage(p));
        setPages(loaded); setStatus("ready");
      } catch(e) { setStatus("error"); }
    })();
  }, [pdfB64]);
  useEffect(() => {
    if (status !== "ready") return;
    pages.forEach((page,i) => {
      const canvas = document.getElementById("pdf-page-"+i);
      if (!canvas) return;
      const vp = page.getViewport({scale});
      canvas.width = vp.width; canvas.height = vp.height;
      page.render({canvasContext: canvas.getContext("2d"), viewport: vp});
    });
  }, [pages, status, scale]);
  if (status==="loading") return <div style={{textAlign:"center",padding:"60px",color:"#64748b"}}>⏳ PDF 렌더링 중...</div>;
  if (status==="error")   return <div style={{textAlign:"center",padding:"40px",color:"#e74c3c"}}>PDF 오류</div>;
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",background:"#f1f5f9",borderBottom:"1px solid #e2e8f0"}}>
        <span style={{fontSize:12,color:"#64748b",fontWeight:600}}>{name}</span>
        <span style={{fontSize:12,color:"#94a3b8",marginLeft:"auto"}}>{pages.length}페이지</span>
        <button onClick={()=>setScale(s=>Math.max(0.6,s-0.2))} style={{padding:"4px 10px",borderRadius:5,border:"1px solid #cbd5e1",background:"#fff",cursor:"pointer",fontSize:13}}>−</button>
        <span style={{fontSize:12,minWidth:36,textAlign:"center"}}>{Math.round(scale*100)}%</span>
        <button onClick={()=>setScale(s=>Math.min(3,s+0.2))} style={{padding:"4px 10px",borderRadius:5,border:"1px solid #cbd5e1",background:"#fff",cursor:"pointer",fontSize:13}}>+</button>
      </div>
      <div style={{overflowY:"auto",maxHeight:"80vh",background:"#525659",padding:"16px",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
        {pages.map((_,i) => (
          <div key={i} style={{boxShadow:"0 2px 8px rgba(0,0,0,.4)"}}>
            <canvas id={"pdf-page-"+i} style={{display:"block"}}/>
          </div>
        ))}
      </div>
    </div>
  );
}

    const nos = pIn.split(/[\n,，、]/).map(s=>s.trim()).filter(Boolean);
    if (!nos.length) return;
    setForm(p => ({...p,pNos:[...new Set([...p.pNos,...nos])]}));
    setPIn("");
  };
  const makeXlsx = async () => {
    setBusy(true);
    try {
      const b64  = await buildExcelB64(form);
      const mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
      setDlHref("data:"+mime+";base64,"+b64);
      setDlName("용접기록서_"+(form.docNo||"draft")+".xlsx");
    } catch(err) { alert("생성 오류: "+err.message); }
    finally { setBusy(false); }
  };

  const C  = (bg)  => ({background:bg||"#f8fafc"});
  const S  = {
    card: {background:"#fff",border:"0.5px solid #e2e8f0",borderRadius:10,padding:"20px 22px",marginBottom:14},
    ct:   {fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:16,paddingBottom:11,borderBottom:"0.5px solid #e2e8f0"},
    row:  {display:"flex",gap:14,marginBottom:14,flexWrap:"wrap"},
    btn:  (c) => ({padding:"8px 16px",borderRadius:7,border:"0.5px solid "+(c?"transparent":"#cbd5e1"),
                   background:c||"#f8fafc",color:c?"#fff":"#1e293b",cursor:"pointer",fontSize:13,fontWeight:600}),
    pill: {display:"inline-flex",alignItems:"center",gap:6,background:"#f8fafc",border:"1px solid #cbd5e1",
           borderRadius:20,padding:"4px 12px",fontSize:12,color:"#1e293b",margin:"3px"},
    th:   {padding:"10px 8px",fontSize:12,fontWeight:700,color:"#64748b",background:"#f8fafc",
           textAlign:"center",whiteSpace:"nowrap",border:"2px solid #64748b"},
    td:   {padding:"0",verticalAlign:"middle",background:"#fff",border:"2px solid #94a3b8"},
    ta:   {width:"100%",padding:"8px 10px",border:"1.5px solid #cbd5e1",borderRadius:6,fontSize:13,
           background:"#fff",color:"#1e293b",outline:"none",resize:"vertical",boxSizing:"border-box"},
  };

  const DlBox = () => dlHref ? (
    <div style={{marginTop:14,padding:"18px",background:"#f0faf4",border:"2px solid #a5d6a7",borderRadius:10,textAlign:"center"}}>
      <div style={{fontSize:13,color:"#2e7d32",marginBottom:10,fontWeight:700}}>✅ 파일 준비 완료!</div>
      <a href={dlHref} download={dlName}
        style={{display:"inline-flex",alignItems:"center",gap:8,background:"#27ae60",color:"#fff",
                padding:"12px 28px",borderRadius:8,fontSize:15,fontWeight:700,textDecoration:"none"}}>
        📄 {dlName} 저장
      </a>
    </div>
  ) : null;

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>

      {/* 헤더 */}
      <div style={{background:"#1a3a5c",padding:"14px 22px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:17}}>⚡ 용접기록서 자동화</div>
          <div style={{color:"#90b8d8",fontSize:11,marginTop:2}}>WELDING RECORD AUTOMATION SYSTEM</div>
        </div>
        <button onClick={makeXlsx} disabled={busy}
          style={{background:busy?"#999":"#27ae60",color:"#fff",border:"none",borderRadius:8,
                  padding:"10px 20px",fontWeight:700,fontSize:14,cursor:busy?"default":"pointer"}}>
          {busy ? "생성 중..." : "📥 파일 생성"}
        </button>
      </div>

      {/* 탭 */}
      <div style={{background:"#1e2d3d",display:"flex",padding:"0 18px"}}>
        {TABS.map((t,i) => (
          <button key={i} onClick={()=>setTab(i)}
            style={{padding:"12px 18px",fontSize:13,fontWeight:600,cursor:"pointer",border:"none",
                    background:"none",color:tab===i?"#fff":"#7fa8c9",
                    borderBottom:tab===i?"3px solid #3b82f6":"3px solid transparent",transition:"color .15s"}}>
            {t}
          </button>
        ))}
      </div>

      <div style={{padding:"18px",maxWidth:1600,margin:"0 auto"}}>

        {/* 탭 0: 기본정보 */}
        {tab===0 && (
          <div>
            <div style={S.card}>
              <div style={S.ct}>문서 기본정보</div>
              <div style={S.row}>
                <AutoIn lb="문서번호" v={form.docNo} h={hk("docNo")} ph="예) WR-NCD230801"
                  onChange={v=>upd("docNo",v)} onSave={v=>saveH("docNo",v)} onDelete={v=>delH("docNo",v)} style={{flex:1}}/>
              </div>
              <div style={S.row}>
                <AutoIn lb="고객" v={form.cust} h={hk("cust")} ph="예) KHNP"
                  onChange={v=>upd("cust",v)} onSave={v=>saveH("cust",v)} onDelete={v=>delH("cust",v)} style={{flex:1}}/>
                <AutoIn lb="공사명" v={form.proj} h={hk("proj")} ph="예) SAEUL #3,4 M254"
                  onChange={v=>upd("proj",v)} onSave={v=>saveH("proj",v)} onDelete={v=>delH("proj",v)} style={{flex:2}}/>
              </div>
              <div style={S.row}>
                <AutoIn lb="제품명" v={form.prod} h={hk("prod")} ph="예) Control Damper"
                  onChange={v=>upd("prod",v)} onSave={v=>saveH("prod",v)} onDelete={v=>delH("prod",v)} style={{flex:2}}/>
                <AutoIn lb="도면번호" v={form.drwNo} h={hk("drwNo")} ph="예) M254-DG-A02-05 Rev.3"
                  onChange={v=>upd("drwNo",v)} onSave={v=>saveH("drwNo",v)} onDelete={v=>delH("drwNo",v)} style={{flex:2}}/>
              </div>
            </div>
            <div style={{...S.card,background:"#f0f7ff",border:"0.5px solid #bed3f5"}}>
              <div style={{fontSize:13,color:"#1a3a5c"}}>💡 입력 이력은 이 브라우저에 저장됩니다.</div>
            </div>
            <DlBox/>
          </div>
        )}

        {/* 탭 1: 제품번호 */}
        {tab===1 && (
          <div>
            <div style={S.card}>
              <div style={S.ct}>제품번호 입력</div>
              <div style={{marginBottom:18}}>
                <div style={{fontSize:12,color:"#64748b",marginBottom:7,fontWeight:600}}>📎 엑셀 파일 드래그 또는 선택</div>
                <div
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                  onDragLeave={()=>setDragOver(false)}
                  onDrop={e=>{e.preventDefault();setDragOver(false);importP(e.dataTransfer.files[0]);}}
                  onClick={()=>pFR.current.click()}
                  style={{border:dragOver?"2.5px solid #3b82f6":"2px dashed #94a3b8",borderRadius:10,
                          padding:"32px 20px",textAlign:"center",cursor:"pointer",
                          background:dragOver?"#eff6ff":"#f8fafc"}}>
                  <div style={{fontSize:36,marginBottom:8}}>📂</div>
                  <div style={{fontSize:14,fontWeight:700,color:dragOver?"#1d4ed8":"#1e293b",marginBottom:4}}>
                    {dragOver?"여기에 놓으세요!":"엑셀 파일을 드래그하세요"}
                  </div>
                  <div style={{fontSize:12,color:"#64748b"}}>클릭해서 선택 · xlsx/xls/csv</div>
                </div>
                <input ref={pFR} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}}
                  onChange={e=>{importP(e.target.files[0]);e.target.value="";}}/>
              </div>
              <div style={{borderTop:"0.5px solid #e2e8f0",paddingTop:16}}>
                <div style={{fontSize:12,color:"#64748b",marginBottom:7,fontWeight:600}}>✏️ 직접 입력 (줄바꿈/쉼표 구분)</div>
                <div style={{display:"flex",gap:10}}>
                  <textarea style={{...S.ta,height:90,flex:1}} value={pIn} onChange={e=>setPIn(e.target.value)}
                    placeholder={"0-624-Y-VR-0001
0-624-Y-VR-0002"}/>
                  <button style={{...S.btn("#1a3a5c"),alignSelf:"flex-start"}} onClick={addP}>+ 추가</button>
                </div>
              </div>
            </div>
            <div style={S.card}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{...S.ct,marginBottom:0}}>등록된 제품번호</div>
                <div style={{background:"#e8f5e9",border:"1px solid #a5d6a7",borderRadius:7,padding:"6px 14px",fontSize:14,fontWeight:700,color:"#2e7d32"}}>
                  {form.pNos.length>0 ? "수량: "+form.pNos.length+" Sets" : "수량: -"}
                </div>
              </div>
              {form.pNos.length===0
                ? <div style={{textAlign:"center",color:"#94a3b8",padding:"28px 0",fontSize:13}}>등록된 제품번호가 없습니다.</div>
                : <div style={{display:"flex",flexWrap:"wrap"}}>
                    {form.pNos.map((n,i) => (
                      <div key={i} style={S.pill}>
                        <span>{n}</span>
                        <button style={{background:"none",border:"none",cursor:"pointer",color:"#e74c3c",fontSize:13}}
                          onClick={()=>setForm(p=>({...p,pNos:p.pNos.filter((_,j)=>j!==i)}))}>✕</button>
                      </div>
                    ))}
                  </div>
              }
              {form.pNos.length>0 && (
                <div style={{marginTop:14,display:"flex",justifyContent:"flex-end"}}>
                  <button style={S.btn()} onClick={()=>setForm(p=>({...p,pNos:[]}))}>전체 삭제</button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* 탭 2: 작업내역 */}
        {tab===2 && (
          <div>
            {/* 저장 다이얼로그 */}
            {showSave && (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",width:380,boxShadow:"0 12px 40px rgba(0,0,0,.25)"}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#1a3a5c",marginBottom:16}}>💾 템플릿 저장</div>
                  <input value={tplName} onChange={e=>setTplName(e.target.value)} placeholder="템플릿 이름"
                    style={{width:"100%",padding:"9px 12px",border:"1.5px solid #94a3b8",borderRadius:7,fontSize:13,boxSizing:"border-box",outline:"none",marginBottom:16}}
                    onKeyDown={e=>{if(e.key==="Enter")saveTpl();}} autoFocus/>
                  <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                    <button style={{padding:"8px 18px",borderRadius:7,border:"0.5px solid #94a3b8",background:"#f8fafc",cursor:"pointer",fontSize:13}}
                      onClick={()=>{setShowSave(false);setTplName("");}}>취소</button>
                    <button style={{padding:"8px 18px",borderRadius:7,border:"none",background:"#1a3a5c",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}
                      onClick={saveTpl}>저장</button>
                  </div>
                </div>
              </div>
            )}
            {/* 불러오기 다이얼로그 */}
            {showLoad && (
              <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{background:"#fff",borderRadius:12,padding:"28px 32px",width:480,maxHeight:"70vh",display:"flex",flexDirection:"column",boxShadow:"0 12px 40px rgba(0,0,0,.25)"}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#1a3a5c",marginBottom:16}}>📂 템플릿 불러오기</div>
                  {tpls.length===0
                    ? <div style={{textAlign:"center",color:"#94a3b8",padding:"30px 0",fontSize:14}}>저장된 템플릿이 없습니다.</div>
                    : <div style={{overflowY:"auto",flex:1}}>
                        {tpls.map((t,i) => (
                          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderRadius:8,border:"1px solid #e2e8f0",marginBottom:8,background:"#f8fafc"}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:14,fontWeight:700,color:"#1a3a5c"}}>{t.name}</div>
                              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{t.date} · {t.entries.length}행</div>
                            </div>
                            <button style={{padding:"7px 14px",borderRadius:6,border:"none",background:"#1a3a5c",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}
                              onClick={()=>loadTpl(t)}>불러오기</button>
                            <button style={{padding:"7px 10px",borderRadius:6,border:"1px solid #fca5a5",background:"#fff5f5",color:"#e74c3c",cursor:"pointer",fontSize:12}}
                              onClick={()=>delTpl(t.name)}>삭제</button>
                          </div>
                        ))}
                      </div>
                  }
                  <div style={{marginTop:16,display:"flex",justifyContent:"flex-end"}}>
                    <button style={{padding:"8px 18px",borderRadius:7,border:"0.5px solid #94a3b8",background:"#f8fafc",cursor:"pointer",fontSize:13}}
                      onClick={()=>setShowLoad(false)}>닫기</button>
                  </div>
                </div>
              </div>
            )}
            <div style={S.card}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{...S.ct,marginBottom:0}}>작업 내역 ({form.entries.length} / {MAX_E}행)</div>
                <div style={{display:"flex",gap:8}}>
                  <button style={{...S.btn(),fontSize:12,padding:"7px 13px"}} onClick={()=>setShowLoad(true)}>📂 불러오기</button>
                  <button style={{...S.btn("#475569"),fontSize:12,padding:"7px 13px"}} onClick={()=>setShowSave(true)}>💾 템플릿 저장</button>
                  <button style={S.btn(form.entries.length<MAX_E?"#1a3a5c":undefined)} onClick={addE} disabled={form.entries.length>=MAX_E}>+ 행 추가</button>
                </div>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{borderCollapse:"collapse",minWidth:1500}}>
                  <thead>
                    <tr>
                      <th style={{...S.th,width:50}}>순번</th>
                      {WFIELDS.map(f => <th key={f.k} style={{...S.th,minWidth:f.w,width:f.w}}>{f.lb}</th>)}
                      <th style={{...S.th,width:50}}>삭제</th>
                    </tr>
                  </thead>
                  <tbody>
                    {form.entries.map((en,i) => (
                      <tr key={i}>
                        <td style={{...S.td,textAlign:"center",fontSize:15,fontWeight:700,color:"#64748b",width:50}}>{i+1}</td>
                        {WFIELDS.map(f => (
                          <td key={f.k} style={{...S.td,minWidth:f.w,width:f.w,height:56}}>
                            {f.tp==="date"
                              ? <input type="date" value={en[f.k]}
                                  style={{width:"100%",padding:"8px",border:"none",fontSize:13,background:"transparent",color:"#1e293b",outline:"none"}}
                                  onChange={e=>updE(i,f.k,e.target.value)}/>
                              : <AutoIn v={en[f.k]} h={[...(f.pre||[]),...hk(f.hk||f.k)]}
                                  onChange={v=>updE(i,f.k,v)} onSave={v=>saveH(f.hk||f.k,v)} onDelete={v=>delH(f.hk||f.k,v)}
                                  style={{width:"100%"}}/>
                            }
                          </td>
                        ))}
                        <td style={{...S.td,textAlign:"center",width:50}}>
                          <button style={{background:"none",border:"none",cursor:"pointer",color:"#e74c3c",fontSize:18,fontWeight:700}}
                            onClick={()=>delE(i)}>✕</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
            <div style={{...S.card,textAlign:"center"}}>
              <button style={{background:"#27ae60",color:"#fff",border:"none",borderRadius:9,padding:"13px 36px",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:8}}
                onClick={makeXlsx}>📥 엑셀 파일 생성</button>
              <DlBox/>
            </div>
          </div>
        )}

        {/* 탭 3: 승인문서 */}
        {tab===3 && (
          <div>
            <div style={S.card}>
              <div style={S.ct}>📄 승인문서 관리</div>
              <div
                onDragOver={e=>{e.preventDefault();setPdfDrag(true);}}
                onDragLeave={()=>setPdfDrag(false)}
                onDrop={e=>{e.preventDefault();setPdfDrag(false);uploadPdf(e.dataTransfer.files[0]);}}
                onClick={()=>pdfFR.current.click()}
                style={{border:pdfDrag?"2.5px solid #3b82f6":"2px dashed #94a3b8",borderRadius:10,
                        padding:"24px 20px",textAlign:"center",cursor:"pointer",
                        background:pdfDrag?"#eff6ff":"#f8fafc",marginBottom:pdfList.length?14:0}}>
                <div style={{fontSize:30,marginBottom:6}}>📎</div>
                <div style={{fontSize:14,fontWeight:700,color:pdfDrag?"#1d4ed8":"#1e293b",marginBottom:4}}>
                  {pdfDrag?"여기에 놓으세요!":"승인문서(PDF) 업로드"}
                </div>
                <div style={{fontSize:12,color:"#64748b"}}>브라우저에 저장 · 최대 5개</div>
              </div>
              <input ref={pdfFR} type="file" accept="application/pdf" style={{display:"none"}}
                onChange={e=>{uploadPdf(e.target.files[0]);e.target.value="";}}/>
              {pdfList.length>0 && (
                <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12}}>
                  {pdfList.map((p,i) => (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                      <button onClick={()=>openPdf(p)}
                        style={{padding:"8px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,
                                border:selPdfName===p.name?"2px solid #3b82f6":"1px solid #e2e8f0",
                                background:selPdfName===p.name?"#eff6ff":"#f8fafc",
                                color:selPdfName===p.name?"#1d4ed8":"#334155"}}>
                        📄 {p.name}
                      </button>
                      <button style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:13}}
                        onClick={()=>removePdf(p.name)}>✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
            {selPdfB64 && (
              <div style={{...S.card,padding:0,overflow:"hidden"}}>
                <PdfViewer pdfB64={selPdfB64} name={selPdfName}/>
              </div>
            )}
            {pdfList.length===0 && (
              <div style={{...S.card,textAlign:"center",color:"#94a3b8",padding:"50px",fontSize:14}}>
                <div style={{fontSize:40,marginBottom:12}}>📋</div>
                <div style={{fontWeight:600,marginBottom:8}}>업로드된 승인문서가 없습니다</div>
                <div style={{fontSize:13}}>PDF를 업로드하면 다음 방문 시에도 유지됩니다.</div>
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
